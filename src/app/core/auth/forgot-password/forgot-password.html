<div class="login-container">
  <div class="logo-wrapper">
    <div class="logo-box">
      <img src="assets/logo.jpg" alt="Care Home Logo" />
    </div>
    <p class="subtitle">Care Management Platform</p>
  </div>

  <div class="login-card">
    <h3>Reset password</h3>
    <p>Request a reset link or enter the code from your email</p>

    <div *ngIf="message" class="session-expired-msg" style="background: #ecfdf5; color: #047857; border-color: #6ee7b7">
      {{ message }}
    </div>
    <div *ngIf="error" class="login-error-msg">{{ error }}</div>

    <div class="tab-container">
      <button type="button" routerLink="/login" routerLinkActive="active" class="tab-btn">Login</button>
      <button type="button" routerLink="/register" routerLinkActive="active" class="tab-btn">Register</button>
    </div>

    @if (step === 'request') {
      <form [formGroup]="requestForm" (ngSubmit)="submitRequest()" class="login-form">
        <div class="input-group">
          <label>Email</label>
          <input
            type="email"
            formControlName="email"
            [class.is-invalid]="hasError(requestForm, 'email', 'required') || hasError(requestForm, 'email', 'email')"
            placeholder="your@email.com"
          />
          <div *ngIf="hasError(requestForm, 'email', 'required')" class="error-message">Email is required</div>
          <div *ngIf="hasError(requestForm, 'email', 'email')" class="error-message">Please enter a valid email</div>
        </div>
        <button type="submit" class="sign-in-btn" [disabled]="isLoading">
          {{ isLoading ? 'Sending…' : 'Send reset instructions' }}
        </button>
        <button type="button" class="sign-in-btn sign-in-btn--secondary" routerLink="/verify-email">
          Verify email
        </button>
      </form>
    } @else {
      <form [formGroup]="resetForm" (ngSubmit)="submitReset()" class="login-form">
        <div class="input-group">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="your@email.com" />
        </div>
        <div class="input-group">
          <label>Code from email</label>
          <input type="text" formControlName="code" placeholder="Enter verification code" autocomplete="one-time-code" />
          <div *ngIf="hasError(resetForm, 'code', 'required')" class="error-message">Code is required</div>
        </div>
        <div class="input-group password-group">
          <label>New password</label>
          <input type="password" formControlName="newPassword" placeholder="At least 8 characters" />
          <div *ngIf="hasError(resetForm, 'newPassword', 'required')" class="error-message">Required</div>
          <div *ngIf="hasError(resetForm, 'newPassword', 'minlength')" class="error-message">Min 8 characters</div>
        </div>
        <div class="input-group password-group">
          <label>Confirm password</label>
          <input type="password" formControlName="confirmPassword" placeholder="Repeat password" />
          <div *ngIf="resetMismatch()" class="error-message">Passwords do not match</div>
        </div>
        <button type="submit" class="sign-in-btn" [disabled]="isLoading">
          {{ isLoading ? 'Updating…' : 'Set new password' }}
        </button>
        <button type="button" class="sign-in-btn" style="margin-top: 0.5rem; background: #64748b; box-shadow: none" (click)="step = 'request'">
          Back
        </button>
      </form>
    }
  </div>
</div>
